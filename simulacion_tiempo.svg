      .body { font: 15px Arial, sans-serif; fill: #1f2937; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .tiny { font: 11px Arial, sans-serif; fill: #475569; }
      .node-label { font: 700 14px Arial, sans-serif; fill: white; }
